# SpectraContent Intelligence OS — local development infrastructure.
# Credentials below are LOCAL DEVELOPMENT ONLY values (also in .env.example);
# production uses managed services with secret-manager-provided credentials.
name: spectra

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: spectra-postgres
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra_local_dev
      POSTGRES_DB: spectra
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spectra -d spectra']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: spectra-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: spectra-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: spectra-local
      MINIO_ROOT_PASSWORD: spectra_local_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
  minio-data:
