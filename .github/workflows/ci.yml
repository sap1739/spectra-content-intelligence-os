name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://spectra:spectra_local_dev@localhost:5432/spectra?schema=public
  REDIS_URL: redis://localhost:6379

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  integration:
    name: Integration tests (API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_local_dev
          POSTGRES_DB: spectra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spectra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm test:integration

  e2e:
    name: End-to-end tests (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @spectra/web... build
      - run: pnpm --filter @spectra/web exec playwright install --with-deps chromium
      - run: pnpm --filter @spectra/web test:e2e
        env:
          CI: 'true'
