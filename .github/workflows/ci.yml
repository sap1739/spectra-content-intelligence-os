name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://spectra:spectra_local_dev@localhost:5432/spectra?schema=public
  REDIS_URL: redis://localhost:6379

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  integration:
    name: Integration tests (API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_local_dev
          POSTGRES_DB: spectra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spectra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: spectra-local
          MINIO_ROOT_PASSWORD: spectra_local_dev
        ports:
          - 9000:9000
    env:
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: spectra-local
      STORAGE_SECRET_KEY: spectra_local_dev
      STORAGE_BUCKET: spectra-dev
      STORAGE_FORCE_PATH_STYLE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && exit 0
            sleep 2
          done
          echo "MinIO did not become healthy" && exit 1
      - run: pnpm test:integration

  e2e:
    name: End-to-end tests (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @spectra/web... build
      - run: pnpm --filter @spectra/web exec playwright install --with-deps chromium
      - run: pnpm --filter @spectra/web test:e2e
        env:
          CI: 'true'
